# ============================================
# MANUAL UNICO DE CADENA DE CUSTODIA
# Versión Optimizada y Estandarizada
# ============================================

metadata:
  version: "2.0"
  fecha_creacion: "2024"
  ultimo_actualizado: "2024-01-15"
  autor: "Organismo de Investigación Penal"
  pais: "Venezuela"
  estado: "Vigente"
  idioma: "es"

titulo: "Manual Único de Cadena de Custodia de Evidencias Físicas"
descripcion: "Procedimiento estandarizado para extracción y análisis de dispositivos Android (WhatsApp) siguiendo el Manual de Cadena de Custodia Venezolano"
alcance: "Aplicable a todos los organismos de investigación penal en Venezuela"

# ============================================
# GLOSARIO DE TERMINOS
# ============================================

glosario:
  - termino: "PRCC"
    definicion: "Planilla de Registro de Cadena de Custodia"
  - termino: "Hash"
    definicion: "Valor criptográfico (MD5/SHA-256) que garantiza integridad de la evidencia"
  - termino: "Write-blocker"
    definicion: "Dispositivo hardware/software que previene escritura en evidencia digital"
  - termino: "Bolsa Faraday"
    definicion: "Contenedor que bloquea señales electromagnéticas para aislar dispositivos"

# ============================================
# FASE INICIAL: OBTENCION
# ============================================

fase_inicial:
  id: "FASE-01"
  nombre: "Fase Inicial - Obtención"
  definicion: "Fase donde se obtienen las evidencias físicas para iniciar la cadena de custodia"
  objetivo: "Garantizar la correcta identificación, documentación y preservación inicial de la evidencia"
  
  formas_obtencion:
    
    # PRIORIDAD: OBTENCION POR CONSIGNACION
    - id: "OBT-001"
      tipo: "Obtención por Consignación"
      prioridad: 1
      definicion: "Cuando el propietario o poseedor entrega voluntariamente la evidencia al organismo de investigación"
      escenarios:
        - "Entrega voluntaria del dispositivo móvil"
        - "Consignación de evidencia digital por ciudadanos"
      
      procedimiento:
        recepcion:
          pasos:
            - orden: 1
              accion: "Verificar identidad de quien consigna (cédula de identidad)"
            - orden: 2
              accion: "Documentar motivo de la consignación"
            - orden: 3
              accion: "Registrar datos del dispositivo (marca, modelo, IMEI, IMEI2, número telefónico)"
            - orden: 4
              accion: "Verificar estado físico del dispositivo"
        
        fijacion:
          medios:
            - "Fijación escrita: Acta de Obtención por Consignación"
            - "Fijación fotográfica: estado del dispositivo, IMEI, pantalla, puertos"
          datos_requeridos:
            - "Marca y modelo"
            - "IMEI y IMEI2"
            - "Número de teléfono/línea"
            - "Estado de la batería"
            - "Daños físicos"
            - "Estado de la pantalla (encendido/apagado)"
      
      documentos_asociados:
        - "Acta de Obtención por Consignación"
        - "PRCC"
    
    # OBTENCION TECNICA
    - id: "OBT-002"
      tipo: "Obtención Técnica"
      prioridad: 2
      definicion: "Cuando el personal especializado acude al sitio del suceso o lugar de ubicación de la evidencia"
      
      procedimiento:
        pasos:
          - orden: 1
            accion: "Protección: Aislar dispositivo (Modo Avión o Bolsa Faraday)"
          - orden: 2
            accion: "Observación Preliminar: Verificar estado del dispositivo"
          - orden: 3
            accion: "Fijación: Fotografías y actas"
          - orden: 4
            accion: "Colección: Uso de write-blockers y extracción con Andriller"
          - orden: 5
            accion: "Embalaje y Rotulación"
          - orden: 6
            accion: "Registro en PRCC"
          - orden: 7
            accion: "Traslado"
        
        hash:
          algoritmos:
            - "MD5"
            - "SHA-256"
          objetivos:
            - "Calcular hash inicial"
            - "Garantizar inalterabilidad"
      
      documentos_asociados:
        - "Acta de Obtención Técnica"
        - "PRCC"
        
    # OBTENCION POR ASEGURAMIENTO
    - id: "OBT-003"
      tipo: "Obtención por Aseguramiento"
      prioridad: 3
      definicion: "Cuando se requiere asegurar evidencias en poder de terceros mediante procedimientos legales"
      requisito_legal: "Orden judicial o autorización fiscal"
      
      procedimiento:
        pasos:
          - orden: 1
            accion: "Verificar documentación legal (orden judicial/fiscal)"
          - orden: 2
            accion: "Identificar personas presentes"
          - orden: 3
            accion: "Proteger y aislar evidencia"
          - orden: 4
            accion: "Fijación fotográfica y escrita"
          - orden: 5
            accion: "Colección con protocolos forenses"
          - orden: 6
            accion: "Embalaje, rotulación y registro en PRCC"
      
      documentos_asociados:
        - "Acta de Obtención por Aseguramiento"
        - "PRCC"
        - "Orden judicial/fiscal"
        
    # OBTENCION POR DERIVACION
    - id: "OBT-004"
      tipo: "Obtención por Derivación"
      prioridad: 4
      definicion: "Cuando del análisis de una evidencia principal se obtiene una nueva evidencia"
      
      tipos:
        - nombre: "Por Separación"
          descripcion: "Diferente naturaleza a la evidencia principal"
        - nombre: "Por Segmentación"
          descripcion: "División de la evidencia principal"
        - nombre: "Por Selección"
          descripcion: "Discriminación para peritaje especializado"
      
      documentos_asociados:
        - "Acta de Obtención por Derivación"
        - "PRCC"

# ============================================
# FASE DE LABORATORIO
# ============================================

fase_laboratorio:
  id: "FASE-02"
  nombre: "Fase de Laboratorio - Peritación"
  definicion: "Fase intermedia destinada a la peritación de evidencias previamente obtenidas"
  objetivo: "Realizar análisis técnico-científico de la evidencia digital preservando su integridad"
  
  proceso_peritacion:
    
    - paso_id: "LAB-001"
      paso: "Recepción en Laboratorio"
      acciones:
        - orden: 1
          accion: "Verificar precintos de seguridad"
        - orden: 2
          accion: "Recalcular Hash para confirmar integridad"
        - orden: 3
          accion: "Cotejar PRCC con el embalaje"
        - orden: 4
          accion: "Verificar correspondencia con oficio de remisión"
      normativa: "ISO/IEC 27042:2015"
      documentos_asociados:
        - "PRCC"
        - "Acta de Recepción"
      
    - paso_id: "LAB-002"
      paso: "Designación"
      acciones:
        - orden: 1
          accion: "Registrar en sistema manual o automatizado"
        - orden: 2
          accion: "Asignar perito responsable"
        - orden: 3
          accion: "Firmar controles y PRCC"
      documentos_asociados:
        - "PRCC"
        - "Registro de Designación"
        
    - paso_id: "LAB-003"
      paso: "Peritaje"
      etapas:
        - nombre: "Valoración"
          descripcion: "Apreciar contexto y planificar técnicas"
        - nombre: "Descripción"
          descripcion: "Detallar características de la evidencia"
        - nombre: "Análisis"
          descripcion: "Aplicar métodos y técnicas (ALEAPP y Andriller)"
        - nombre: "Interpretación"
          descripcion: "Evaluar datos resultantes"
        - nombre: "Conclusión"
          descripcion: "Juicio de valor técnico-científico"
      
      herramientas:
        - nombre: "Andriller"
          funcion: "Extracción lógica y física"
          caracteristicas:
            - "Solo lectura (no destructivo)"
            - "Forensemente sólido"
          requisito: "Documentar versión exacta usada"
          
        - nombre: "ALEAPP"
          funcion: "Android Logs Events And Protobuf Parser"
          descripcion: "Parseo de SQLite, Protobuf, reconstrucción de eventos WhatsApp"
          requisito: "Documentar versión exacta usada"
      
      documentos_asociados:
        - "Acta Pericial"
        - "Reporte de Análisis"
        
    - paso_id: "LAB-004"
      paso: "Remisión"
      acciones:
        - orden: 1
          accion: "Entregar dictamen pericial"
        - orden: 2
          accion: "Remitir evidencias y PRCC al despacho solicitante"
        - orden: 3
          accion: "Acotar en PRCC la remisión"
      documentos_asociados:
        - "Dictamen Pericial"
        - "PRCC"
        - "Oficio de Remisión"

# ============================================
# FASE DE DISPOSICION JUDICIAL
# ============================================

fase_disposicion_judicial:
  id: "FASE-03"
  nombre: "Fase de Disposición Judicial"
  definicion: "Momento en que la evidencia pasa a disposición del Poder Judicial tras admitirse la acusación"
  objetivo: "Garantizar la disponibilidad de la evidencia durante el proceso judicial"
  
  procesos:
    - proceso_id: "JUD-001"
      nombre: "Resguardo Judicial"
      descripcion: "Almacenamiento en áreas especializadas del Poder Judicial"
      
    - proceso_id: "JUD-002"
      nombre: "Exhibición en Audiencia"
      descripcion: "Cumplir procedimiento de traslado y transferencia"
  
  documento_asociado: "Acta de Exhibición de Evidencias"

# ============================================
# FASE DE DISPOSICION FINAL
# ============================================

fase_disposicion_final:
  id: "FASE-04"
  nombre: "Fase de Disposición Final - Cierre"
  definicion: "Fase final que pone fin al tratamiento de las evidencias"
  objetivo: "Cerrar formalmente la cadena de custodia según disposición legal"
  
  formas_cierre:
    - tipo: "Devolución"
      descripcion: "Restituir a quien tenga legítimo derecho"
      requisito: "Autorización judicial"
      
    - tipo: "Entrega"
      descripcion: "Otorgar a persona jurídica autorizada"
      requisito: "Autorización judicial"
      
    - tipo: "Destrucción"
      descripcion: "Inutilizar evidencia sin interés"
      requisito: "Autorización judicial"
      
    - tipo: "Consumida en Peritaje"
      descripcion: "Agotada durante análisis"
      requisito: "Documentar en acta pericial"
    
  procedimientos:
    - orden: 1
      accion: "Ejecución: materializar devolución, entrega o destrucción"
    - orden: 2
      accion: "Cierre de PRCC: dejar constancia en observaciones y remitir al expediente"
    
  documento_asociado: "Acta de Disposición Final de Evidencias"

# ============================================
# FIGURAS DE CARACTER CONTINUO
# ============================================

figuras_continuas:
  definicion: "Procesos y procedimientos que se cumplen en cualquier fase del sistema"
  
  procesos:
    - id: "CONT-001"
      nombre: "Proceso de Resguardo"
      definicion: "Protección y conservación en espacios especializados"
      etapas:
        - nombre: "Ingreso"
          acciones:
            - "Verificar PRCC"
            - "Verificar identidad"
            - "Verificar condiciones de la evidencia"
        - nombre: "Depósito"
          acciones:
            - "Almacenamiento bajo condiciones óptimas"
        - nombre: "Egreso"
          acciones:
            - "Disposición expresa y por escrito del Fiscal o Tribunal"
      
      lineamientos:
        - "Solo personal autorizado"
        - "Control de temperatura, humedad, seguridad"
        - "Inventario periódico (máximo un año)"
        
    - id: "CONT-002"
      nombre: "Procedimiento de Traslado"
      lineamientos:
        - "Verificar condiciones de evidencia y embalaje"
        - "Seleccionar medio que minimice riesgos"
        - "Asentar datos en PRCC"
        
    - id: "CONT-003"
      nombre: "Actividad de Transferencia"
      lineamientos:
        - "Verificar condiciones físicas y precintos"
        - "Verificar PRCC con rotulado"
        - "Asentar datos de quien entrega y recibe"

# ============================================
# DOCUMENTOS ASOCIADOS
# ============================================

documentos_asociados:
  - id: "DOC-001"
    nombre: "Acta Policial"
    fase: "Inicial"
    
  - id: "DOC-002"
    nombre: "Acta de Investigación Penal"
    fase: "Inicial"
    
  - id: "DOC-003"
    nombre: "Acta de Obtención Técnica"
    fase: "Inicial"
    
  - id: "DOC-004"
    nombre: "Acta de Obtención por Aseguramiento"
    fase: "Inicial"
    
  - id: "DOC-005"
    nombre: "Acta de Obtención por Consignación"
    fase: "Inicial"
    prioridad: "Alta"
    
  - id: "DOC-006"
    nombre: "Acta de Obtención por Derivación"
    fase: "Inicial"
    
  - id: "DOC-007"
    nombre: "Acta de Disposición Final"
    fase: "Disposición Final"
    
  - id: "DOC-008"
    nombre: "Acta de Levantamiento de Cadáver"
    fase: "Inicial"
    
  - id: "DOC-009"
    nombre: "Acta de Inspección"
    fase: "Inicial"
    
  - id: "DOC-010"
    nombre: "Acta Pericial"
    fase: "Laboratorio"
    
  - id: "DOC-011"
    nombre: "Planilla de Registro de Cadena de Custodia (PRCC)"
    fase: "Transversal"
    obligatorio: true
    
  - id: "DOC-012"
    nombre: "Dictamen Pericial"
    fase: "Laboratorio"
    
  - id: "DOC-013"
    nombre: "Memorandos y Oficios"
    fase: "Transversal"

# ============================================
# ESTRUCTURA DEL DICTAMEN PERICIAL
# ============================================

dictamen_pericial:
  estructura_obligatoria:
    - orden: 1
      seccion: "Motivo"
      descripcion: "Razón por la cual se practica la peritación"
      
    - orden: 2
      seccion: "Descripción"
      descripcion: "Estado en que se halló y recibió la evidencia"
      
    - orden: 3
      seccion: "Exámenes Practicados"
      descripcion: "Detalle de softwares (versiones Andriller y ALEAPP), técnicas y valores Hash"
      
    - orden: 4
      seccion: "Resultados"
      descripcion: "Tabla con nombre nativo, fechas, ruta, tamaño y Hash individual"
      
    - orden: 5
      seccion: "Conclusiones"
      descripcion: "Juicio de valor técnico-científico sin precalificación jurídica"
      
    - orden: 6
      seccion: "Consumo de Evidencia"
      descripcion: "Constancia si fue consumida o alterada"
  
  formalidades:
    - "Presentación por escrito"
    - "Firma del Perito Informático"
    - "Sello del perito"
    - "Versión exacta de herramientas usadas"

# ============================================
# MARCO LEGAL VENEZOLANO
# ============================================

marco_legal:
  constitucion:
    - principio: "Debido proceso"
      articulo: "CRBV Art. 49"
      
    - principio: "Tutela judicial efectiva"
      articulo: "CRBV Art. 26"
      
    - principio: "Privacidad de las comunicaciones"
      articulo: "CRBV Art. 48"
    
  leyes:
    - nombre: "COPP (Código Orgánico Procesal Penal)"
      descripcion: "Regula el proceso penal venezolano"
      articulos:
        - numero: "Art. 188"
          descripcion: "Resguardo de evidencias"
        - numero: "Art. 178"
          descripcion: "Régimen de licitud de la prueba"
        - numero: "Art. 283"
          descripcion: "Obligatoriedad de cadena de custodia"
        
    - nombre: "Ley Especial contra Delitos Informáticos (2001)"
      descripcion: "Tipifica delitos cibernéticos"
      ambito: "Delitos informáticos y relacionados"
      
    - nombre: "Ley de Infogobierno"
      descripcion: "Validez y seguridad de tecnologías de información"
      ambito: "Tecnologías de información en el sector público"
      
    - nombre: "Ley sobre Mensajes de Datos y Firmas Electrónicas"
      descripcion: "Reconocimiento legal de documentos electrónicos"
      articulos:
        - numero: "Art. 4"
          descripcion: "Eficacia probatoria de mensajes de datos"
        - numero: "Art. 8"
          descripcion: "Misma eficacia que documento escrito"

# ============================================
# ESTANDARES INTERNACIONALES
# ============================================

estandares:
  - id: "STD-001"
    norma: "ISO/IEC 27037:2012"
    titulo: "Identificación, colección, adquisición y preservación de evidencia digital"
    aplicacion: "Fase Inicial"
    
  - id: "STD-002"
    norma: "ISO/IEC 27042:2015"
    titulo: "Análisis e interpretación de pruebas digitales"
    aplicacion: "Fase de Laboratorio"
    
  - id: "STD-003"
    norma: "NIST SP 800-101 r1"
    titulo: "Guía para forensia de dispositivos móviles"
    aplicacion: "Dispositivos móviles"

# ============================================
# HERRAMIENTAS FORENSES AUTORIZADAS
# ============================================

herramientas:
  # ── Plataforma Linux Forense ──
  plataforma:
    descripcion: "Todas las extracciones y análisis se ejecutan sobre distribuciones Linux forenses"
    distros:
      - nombre: "CAINE"
        id: "HERR-DIST-001"
        nombre_completo: "Computer Aided INvestigative Environment"
        uso: "Distribución live forense completa"
        caracteristicas:
          - "Entorno live (no altera el dispositivo)"
          - "Write-blocker integrado"
          - "Herramientas preinstaladas: Autopsy, Guymager, Scalpel"
          - "Interfaz gráfica optimizada para peritaje"
        enfoque_movil: "Montaje seguro de imágenes, extracción de filesystems Android"
        
      - nombre: "Tsurugi Linux"
        id: "HERR-DIST-002"
        uso: "DFIR (Digital Forensics and Incident Response)"
        caracteristicas:
          - "Orientada a respuesta a incidentes y forense digital"
          - "Herramientas de OSINT, malware analysis y network forensics"
          - "Soporte nativo para dispositivos móviles"
          - "Módulos de timeline reconstruction"
        enfoque_movil: "Análisis de artefactos Android, reconstrucción de timelines"
        enfoque_incidentes: "Respuesta rápida a incidentes con herramientas DFIR integradas"
        
      - nombre: "Santoku"
        id: "HERR-DIST-003"
        uso: "Distribución Linux especializada en forense móvil"
        caracteristicas:
          - "Enfocada en extracción de datos de smartphones"
          - "Herramientas de análisis de bases de datos SQLite"
          - "Compatibilidad con formatos de imagen forense"
          - "Scripts automatizados de extracción"
        enfoque_movil: "Análisis directo de filesystems Android y bases de datos de mensajería"
        
      - nombre: "Kali Linux"
        id: "HERR-DIST-004"
        uso: "Plataforma avanzada de pruebas de penetración y forense"
        caracteristicas:
          - "Amplio repositorio de herramientas forenses"
          - "Soporte para múltiples arquitecturas"
          - "Herramientas de recuperación de datos y análisis de memoria"
        enfoque_forense: "Análisis profundo de artefactos y recuperación de datos"

  # ── Herramientas de Extracción ──
  andriller:
    id: "HERR-001"
    uso: "Extracción lógica y física en dispositivos Android"
    plataforma: "Linux (CAINE / Tsurugi / Santoku / Kali Linux)"
    caracteristicas:
      - "Solo lectura (no destructivo)"
      - "Forensemente sólido"
      - "Código abierto"
    version_requerida: "Documentar versión exacta usada"
    compatibilidad: "Android 4.0+"

  # ── Herramientas de Análisis ──    
  aleapp:
    id: "HERR-002"
    uso: "Android Logs Events And Protobuf Parser"
    funcion: "Parseo de SQLite, Protobuf, reconstrucción de eventos WhatsApp"
    plataforma: "Linux (CAINE / Tsurugi / Santoku / Kali Linux)"
    version_requerida: "Documentar versión exacta usada"
    artefactos_soportados:
      - "WhatsApp"
      - "SMS"
      - "Llamadas"
      - "Ubicaciones"
      - "Aplicaciones instaladas"
    formatos_salida:
      - "HTML interactivo"
      - "CSV/Excel"
      - "JSON"
      - "Timeline (ISO 27042)"

# ============================================
# CONTROL DE VERSIONES
# ============================================

control_versiones:
  - version: "1.0"
    fecha: "2023-01-01"
    cambios: "Versión inicial"
    
  - version: "2.0"
    fecha: "2024-01-15"
    cambios:
      - "Estandarización de estructura YAML"
      - "Adición de IDs únicos para trazabilidad"
      - "Inclusión de glosario de términos"
      - "Mejora en documentación de procedimientos"
      - "Optimización de metadatos"
      - "Corrección de acentos y caracteres especiales"
