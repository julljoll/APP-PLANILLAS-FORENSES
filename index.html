         ══════════════════════════════════════════════════════════ -->

    <!-- Content Security Policy: restringe recursos externos -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self' https://generativelanguage.googleapis.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        upgrade-insecure-requests;
      " />

    <!-- Evita que la app sea embebida en iframes (clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Previene sniffing de tipos MIME -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Controla la información de referencia enviada -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Limita permisos de API del navegador -->
    <meta http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), payment=(), usb=()" />
